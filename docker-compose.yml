services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=development
      - DATABASE_URL=sqlite+aiosqlite:///./app.db
      - LOG_LEVEL=DEBUG
    volumes:
      - .:/app
      - /app/__pycache__
    command: uv run uvicorn claude_py_scaffold.main:app --reload --host 0.0.0.0 --port 8000

